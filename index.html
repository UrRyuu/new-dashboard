<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE - PHON 32 | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class', // Enable dark mode via class
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .bg-light-base {
            background-color: #fafafa;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        @keyframes pulse-emerald {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        .animate-pulse-slow {
            animation: pulse-emerald 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>

<body
    class="bg-light-base dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen p-8 max-w-7xl mx-auto transition-colors duration-300">

    <!-- Header Section -->
    <header
        class="flex justify-between items-center mb-8 pb-4 border-b border-transparent dark:border-slate-800 transition-colors duration-300">
        <div>
            <h1 class="text-xl font-bold tracking-tight">SE - PHON 32</h1>
            <p class="text-[10px] font-bold tracking-widest text-slate-400 dark:text-slate-500 uppercase mt-1">
                Integrated Hydro Observation Platform</p>
        </div>
        <div class="flex items-center gap-8">
            <button id="theme-toggle"
                class="cursor-pointer text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-amber-300 transition-colors">
                <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <!-- Default to moon icon -->
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>
            </button>
            <div class="flex flex-col items-end">
                <span
                    class="text-[9px] font-bold tracking-widest text-slate-400 dark:text-slate-500 uppercase mb-0.5">Live
                    System Clock</span>
                <span class="font-mono text-sm font-semibold text-slate-800 dark:text-slate-200"
                    id="live-clock">--.--.--</span>
            </div>
            <div
                class="flex flex-col items-end border-l border-slate-200 dark:border-slate-700 pl-8 transition-colors duration-300">
                <span
                    class="text-[9px] font-bold tracking-widest text-slate-400 dark:text-slate-500 uppercase mb-0.5">Sync
                    Status</span>
                <div class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse-slow"></span>
                    <span class="font-mono text-sm text-emerald-500 font-semibold" id="sync-timer">00:00:00</span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- Title & Controls -->
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-3xl font-extrabold tracking-tight">Real-time <span
                        class="text-blue-500 dark:text-blue-400">Telemetry</span></h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 font-medium">Live data sequence from
                    underwater probe</p>
            </div>
            <button id="refresh-btn"
                class="bg-slate-800 dark:bg-blue-600 hover:bg-slate-700 dark:hover:bg-blue-500 text-white text-[11px] font-bold px-4 py-2.5 rounded flex items-center gap-2 transition-all active:scale-95 uppercase tracking-widest shadow-sm">
                <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke-width="2" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
                REFRESH SYSTEM
            </button>
        </div>

        <!-- Metric Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- pH Card -->
            <div
                class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 relative overflow-hidden flex flex-col justify-between min-h-[140px] transition-colors duration-300">
                <div class="flex justify-between items-start">
                    <div class="flex items-center gap-2 text-slate-400 dark:text-slate-300">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9.75 3.104v5.714a2.25 2.25 0 0 1-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 0 1 4.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0 1 12 15a9.065 9.065 0 0 0-6.23-.693L5 14.5m14.8.8 1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0 1 12 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5" />
                        </svg>
                        <span class="text-[10px] font-bold tracking-widest uppercase">pH Level</span>
                    </div>
                    <span
                        class="text-[9px] font-bold bg-emerald-50 dark:bg-emerald-500/10 text-emerald-500 px-2 py-1 rounded-full border border-emerald-100 dark:border-emerald-500/20 uppercase tracking-wider">Optimal</span>
                </div>
                <div class="mt-4 flex items-baseline gap-1">
                    <span
                        class="text-[2.75rem] font-extrabold text-slate-800 dark:text-white tracking-tight leading-none"
                        id="ph-value">--</span>
                    <span class="text-sm font-semibold text-slate-400 dark:text-slate-500 ml-1">pH</span>
                </div>
                <div class="absolute bottom-0 left-0 w-full h-1 bg-[#22d3ee]"></div>
            </div>

            <!-- Turbidity Card -->
            <div
                class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 relative overflow-hidden flex flex-col justify-between min-h-[140px] transition-colors duration-300">
                <div class="flex justify-between items-start">
                    <div class="flex items-center gap-2 text-slate-400 dark:text-slate-300">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 3v17.25m0 0c-1.472 0-2.882.265-4.185.75M12 20.25c1.472 0 2.882.265 4.185.75M18.75 4.97A48.416 48.416 0 0 0 12 4.5c-2.291 0-4.545.16-6.75.47m13.5 0c1.01.143 2.01.317 3 .52m-3-.52v8.636c0 1.941-1.567 3.5-3.5 3.5s-3.5-1.559-3.5-3.5V4.97m-6.75 0v8.636c0 1.941 1.567 3.5 3.5 3.5s3.5-1.559 3.5-3.5V4.97" />
                        </svg>
                        <span class="text-[10px] font-bold tracking-widest uppercase">Water Turbidity</span>
                    </div>
                    <span
                        class="text-[9px] font-bold bg-blue-50 dark:bg-blue-500/10 text-blue-500 px-2 py-1 rounded-full border border-blue-100 dark:border-blue-500/20 uppercase tracking-wider">Good</span>
                </div>
                <div class="mt-4 flex items-baseline gap-1">
                    <span
                        class="text-[2.75rem] font-extrabold text-slate-800 dark:text-white tracking-tight leading-none"
                        id="turbidity-value">--</span>
                    <span class="text-sm font-semibold text-slate-400 dark:text-slate-500 ml-1">NTU</span>
                </div>
                <div class="absolute bottom-0 left-0 w-full h-1 bg-[#3b82f6]"></div>
            </div>

            <!-- Battery Card -->
            <div
                class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 relative overflow-hidden flex flex-col justify-between min-h-[140px] transition-colors duration-300">
                <div class="flex justify-between items-start">
                    <div class="flex items-center gap-2 text-slate-400 dark:text-slate-300">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M21 10.5h.375c.621 0 1.125.504 1.125 1.125v2.25c0 .621-.504 1.125-1.125 1.125H21M4.5 10.5h6.75V15H4.5v-4.5ZM3.75 18h15A2.25 2.25 0 0 0 21 15.75v-6a2.25 2.25 0 0 0-2.25-2.25h-15A2.25 2.25 0 0 0 1.5 9.75v6A2.25 2.25 0 0 0 3.75 18Z" />
                        </svg>
                        <span class="text-[10px] font-bold tracking-widest uppercase">Battery Status</span>
                    </div>
                    <span
                        class="text-[9px] font-bold bg-purple-50 dark:bg-purple-500/10 text-purple-500 px-2 py-1 rounded-full border border-purple-100 dark:border-purple-500/20 uppercase tracking-wider">Charging</span>
                </div>
                <div class="mt-4 flex items-baseline gap-1">
                    <span
                        class="text-[2.75rem] font-extrabold text-slate-800 dark:text-white tracking-tight leading-none"
                        id="energy-value">--</span>
                    <span class="text-sm font-semibold text-slate-400 dark:text-slate-500 ml-1">%</span>
                </div>
                <div class="absolute bottom-0 left-0 w-full h-1 bg-[#a855f7]"></div>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative">
            <!-- pH Chart -->
            <div
                class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 w-full transition-colors duration-300">
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-1.5 h-4 bg-[#22d3ee] rounded-full"></div>
                    <h3 class="text-xs font-bold text-slate-800 dark:text-slate-200 tracking-widest uppercase">PH Level
                        Trend</h3>
                </div>
                <div class="w-full relative h-[300px]">
                    <canvas id="phChart"></canvas>
                </div>
            </div>

            <!-- Turbidity Chart -->
            <div
                class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 w-full transition-colors duration-300">
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-1.5 h-4 bg-[#3b82f6] rounded-full"></div>
                    <h3 class="text-xs font-bold text-slate-800 dark:text-slate-200 tracking-widest uppercase">Turbidity
                        Trend (NTU)</h3>
                </div>
                <div class="w-full relative h-[300px]">
                    <canvas id="turbidityChart"></canvas>
                </div>
            </div>
        </div>

    </main>

    <!-- Script to Handle Dynamic Elements -->
    <script>
        // --- Dark/Light Mode Theme Logic ---
        let isDarkMode = false;
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        // Check local storage or system preference
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            isDarkMode = true;
            setSunIcon();
        }

        function setSunIcon() {
            themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />';
        }

        function setMoonIcon() {
            themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />';
        }

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            isDarkMode = document.documentElement.classList.contains('dark');
            localStorage.theme = isDarkMode ? 'dark' : 'light';

            if (isDarkMode) setSunIcon();
            else setMoonIcon();

            updateChartTheme();
        });


        // --- Chart Configuration ---
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#94a3b8';

        const phCtx = document.getElementById('phChart').getContext('2d');
        const turbidityCtx = document.getElementById('turbidityChart').getContext('2d');

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            layout: {
                padding: { right: 10 }
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    mode: 'index',
                    intersect: false,
                    backgroundColor: 'rgba(30, 41, 59, 0.95)',
                    titleColor: '#f8fafc',
                    bodyColor: '#cbd5e1',
                    borderColor: '#334155',
                    borderWidth: 1,
                    padding: 12,
                    displayColors: true,
                    boxPadding: 4,
                    usePointStyle: true,
                }
            },
            scales: {
                x: {
                    display: false
                },
                y: {
                    display: true,
                    border: { display: false },
                    grid: {
                        color: isDarkMode ? '#334155' : '#f1f5f9', // Dynamic grid color
                        drawBorder: false,
                        tickLength: 0
                    },
                    ticks: {
                        color: '#94a3b8',
                        font: { size: 10, weight: '500' },
                        padding: 12,
                        maxTicksLimit: 8
                    },
                    beginAtZero: true
                }
            },
            interaction: {
                mode: 'nearest',
                axis: 'x',
                intersect: false
            }
        };

        const phChart = new Chart(phCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'pH Level',
                    data: [],
                    borderColor: isDarkMode ? '#334155' : '#e2e8f0',
                    borderWidth: 2,
                    tension: 0,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    pointHoverBackgroundColor: '#22d3ee',
                    pointHoverBorderColor: '#fff',
                    pointHoverBorderWidth: 2,
                    fill: false
                }]
            },
            options: {
                ...commonOptions,
                scales: {
                    ...commonOptions.scales,
                    y: {
                        ...commonOptions.scales.y,
                        suggestedMax: 14,
                        ticks: {
                            ...commonOptions.scales.y.ticks,
                            stepSize: 2,
                            callback: function (value) { return value; }
                        }
                    }
                }
            }
        });

        const turbidityChart = new Chart(turbidityCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Turbidity (NTU)',
                    data: [],
                    borderColor: isDarkMode ? '#334155' : '#e2e8f0',
                    borderWidth: 2,
                    tension: 0,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    pointHoverBackgroundColor: '#3b82f6',
                    pointHoverBorderColor: '#fff',
                    pointHoverBorderWidth: 2,
                    fill: false
                }]
            },
            options: {
                ...commonOptions,
                scales: {
                    ...commonOptions.scales,
                    y: {
                        ...commonOptions.scales.y,
                        suggestedMax: 3000,
                        ticks: {
                            ...commonOptions.scales.y.ticks,
                            stepSize: 500,
                            callback: function (value) { return value.toLocaleString(); }
                        }
                    }
                }
            }
        });

        function updateChartTheme() {
            const gridColor = isDarkMode ? '#334155' : '#f1f5f9';
            const lineColor = isDarkMode ? '#475569' : '#e2e8f0';

            phChart.options.scales.y.grid.color = gridColor;
            turbidityChart.options.scales.y.grid.color = gridColor;

            if (phChart.data.datasets[0].data.length > 0) {
                phChart.data.datasets[0].borderColor = lineColor;
            }
            if (turbidityChart.data.datasets[0].data.length > 0) {
                turbidityChart.data.datasets[0].borderColor = lineColor;
            }

            phChart.update();
            turbidityChart.update();
        }

        // --- Live Clock & Sync Timer ---
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }).replace(/:/g, '.');
            document.getElementById('live-clock').textContent = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        let syncSeconds = 299;
        function updateSyncTimer() {
            syncSeconds++;
            const hrs = String(Math.floor(syncSeconds / 3600)).padStart(2, '0');
            const mins = String(Math.floor((syncSeconds % 3600) / 60)).padStart(2, '0');
            const secs = String(syncSeconds % 60).padStart(2, '0');
            document.getElementById('sync-timer').textContent = `${hrs}:${mins}:${secs}`;
        }
        setInterval(updateSyncTimer, 1000);

        // --- API Polling & Refresh System ---
        async function fetchDroneData() {
            try {
                const responseLatest = await fetch('api.php?get_latest=true');
                if (!responseLatest.ok) return;
                const latestData = await responseLatest.json();

                if (latestData && latestData.status !== 'empty') {
                    if (latestData.kualitas_air !== undefined) {
                        const phValue = parseFloat(latestData.kualitas_air).toFixed(1);
                        document.getElementById('ph-value').innerHTML = `${phValue}`;
                    }
                    if (latestData.tahan !== undefined) {
                        const turbidityValue = parseFloat(latestData.tahan).toFixed(0);
                        document.getElementById('turbidity-value').innerHTML = `${turbidityValue}`;
                    }
                    if (latestData.daya_listrik !== undefined) {
                        const energyValue = parseFloat(latestData.daya_listrik).toFixed(0);
                        document.getElementById('energy-value').innerHTML = `${energyValue}`;
                    }
                }

                const responseHistory = await fetch('api.php?get_history=true&limit=20');
                if (!responseHistory.ok) return;
                const historyData = await responseHistory.json();

                if (historyData && historyData.status === 'success' && historyData.data) {
                    const dataArr = Array.isArray(historyData.data) ? historyData.data : [];
                    if (dataArr.length > 0) {
                        const chronologicalData = [...dataArr].reverse();

                        const labels = chronologicalData.map(r => r.timestamp ? r.timestamp.split(' ')[1] : '');
                        const phData = chronologicalData.map(r => parseFloat(r.kualitas_air));
                        const turbidityData = chronologicalData.map(r => parseFloat(r.tahan));

                        phChart.data.labels = labels;
                        phChart.data.datasets[0].data = phData;

                        turbidityChart.data.labels = labels;
                        turbidityChart.data.datasets[0].data = turbidityData;

                        updateChartTheme(); // ensures the color is correct when data arrives
                    }
                }
            } catch (error) {
                console.error('Error fetching drone data:', error);
            }
        }

        // Refresh Button Event Listener
        const refreshBtn = document.getElementById('refresh-btn');
        const refreshIcon = document.getElementById('refresh-icon');

        refreshBtn.addEventListener('click', async () => {
            // Add loading state
            refreshIcon.classList.add('animate-spin');
            refreshBtn.classList.add('opacity-80', 'cursor-wait');

            await fetchDroneData();

            // Remove loading state after a slight delay to make it visible to the user
            setTimeout(() => {
                refreshIcon.classList.remove('animate-spin');
                refreshBtn.classList.remove('opacity-80', 'cursor-wait');
            }, 600);
        });

        // Set interval for auto-refresh
        setInterval(fetchDroneData, 2000);
        fetchDroneData(); // Initial load
    </script>
</body>

</html>
